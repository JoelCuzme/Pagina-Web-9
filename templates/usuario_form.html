{% extends "base.html" %}

{% block title %}Registro de Usuario{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4 p-4">
            <div class="text-center mb-4">
                <i class="bi bi-person-plus-fill display-4 text-primary"></i>
                <h3 class="fw-bold text-primary mt-2">Crear Nueva Cuenta</h3>
                <p class="text-muted small">Regístrate para gestionar citas y facturación en SaludTotal+</p>
            </div>

            <form action="{{ url_for('registrar_usuario') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Nombre Completo</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                        <input type="text" name="nombre" class="form-control border-start-0" placeholder="Ej: Dr. Wilson Ramos" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Correo Electrónico</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
                        <input type="email" name="mail" class="form-control border-start-0" placeholder="correo@ejemplo.com" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-key"></i></span>
                        <input type="password" name="password" class="form-control border-start-0" placeholder="Mínimo 8 caracteres" required>
                    </div>
                    <div class="form-text">Nunca compartas tu contraseña con nadie.</div>
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-pill">
                        Finalizar Registro
                    </button>
                </div>
            </form>

            <div class="text-center mt-4 border-top pt-3">
                <p class="mb-0 text-muted small">¿Ya tienes una cuenta?</p>
                <a href="{{ url_for('login') }}" class="fw-bold text-decoration-none">Inicia Sesión Aquí</a>
            </div>
        </div>
        
        <div class="text-center mt-3">
            <a href="/" class="text-muted small text-decoration-none">
                <i class="bi bi-arrow-left"></i> Volver al Inicio
            </a>
        </div>
    </div>
</div>
{% endblock %}
