{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2 class="text-primary">Lista de Usuarios (MySQL)</h2>
    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Email</th>
                    </tr>
                </thead>
                <tbody>
                    {% for u in usuarios %}
                    <tr>
                        <td>{{ u.id_usuario }}</td>
                        <td>{{ u.nombre }}</td>
                        <td>{{ u.mail }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <a href="{{ url_for('registrar_usuario') }}" class="btn btn-primary">Nuevo Usuario</a>
        </div>
    </div>
</div>
{% endblock %}
