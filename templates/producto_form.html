{% extends "base.html" %}
{% block title %}Nuevo Producto{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 shadow-lg border-0">
            <h3 class="text-primary mb-4 text-center">Registro de Medicinas</h3>
            <p class="text-muted small text-center">Los datos se sincronizarán automáticamente en SQL, JSON, CSV y TXT.</p>
            
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Nombre del Medicamento</label>
                    <input type="text" name="nombre" class="form-control" placeholder="Ej. Paracetamol" required>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Precio ($)</label>
                        <input type="number" step="0.01" name="precio" class="form-control" placeholder="0.00" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Cantidad en Stock</label>
                        <input type="number" name="cantidad" class="form-control" placeholder="0" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-3">Guardar en Sistema</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
